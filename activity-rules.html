<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>瓦友社 · 开学季活动规则</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,system-ui,sans-serif;background:#0a0e13;color:#ece8e1;overflow-x:hidden}
  #gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 70% 20%,rgba(255,70,85,.18),transparent 55%),#0a0e13;overflow:hidden}
  #gate::before{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(0deg,transparent 0 38px,rgba(255,70,85,.04) 38px 39px),
      repeating-linear-gradient(90deg,transparent 0 38px,rgba(255,70,85,.04) 38px 39px)}
  .particle{position:absolute;width:3px;height:3px;background:#ff4655;border-radius:50%;opacity:.5;animation:flo linear infinite}
  @keyframes flo{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
  .card{position:relative;z-index:2;width:min(92vw,420px);padding:44px 38px;border-radius:16px;
    background:linear-gradient(180deg,rgba(18,29,40,.96),rgba(15,25,35,.96));border:1px solid rgba(255,70,85,.3);
    box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);text-align:center}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:#ff4655;border-radius:16px 0 0 16px}
  .kk{font-size:12px;letter-spacing:.24em;color:#ff6b76;font-weight:700;text-transform:uppercase}
  .card h1{font-size:25px;font-weight:900;margin:14px 0 6px;line-height:1.15}
  .card h1 b{color:#ff4655}
  .card p{font-size:13.5px;color:#9aa7b4;margin-bottom:26px}
  .pw{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);
    border-radius:10px;color:#fff;font-size:15px;outline:none;transition:.25s;letter-spacing:.04em}
  .pw:focus{border-color:#ff4655;background:rgba(255,70,85,.06)}
  .btn{width:100%;margin-top:14px;padding:14px;background:#ff4655;border:none;border-radius:10px;
    color:#fff;font-size:15px;font-weight:800;letter-spacing:.06em;cursor:pointer;transition:.2s}
  .btn:hover{background:#ff5d6a}.btn:active{transform:translateY(1px)}
  .err{color:#ff4655;font-size:13px;margin-top:14px;min-height:18px;font-weight:600}
  .hint{margin-top:18px;font-size:11.5px;color:#62707d;letter-spacing:.03em}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <div class="kk">VALORANT · 瓦友社</div>

  </div>
</div>

async function decrypt(pw){
  const data=JSON.parse(atob(PAYLOAD));const enc=new TextEncoder();
  const salt=Uint8Array.from(atob(data.salt),c=>c.charCodeAt(0));
  const nonce=Uint8Array.from(atob(data.nonce),c=>c.charCodeAt(0));
  const ct=Uint8Array.from(atob(data.ct),c=>c.charCodeAt(0));
  const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:data.iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},key,ct);
  return new TextDecoder().decode(pt);
}
async function enter(){
  const pw=document.getElementById("pw").value.trim();const err=document.getElementById("err");
  if(!pw){err.textContent="请输入密码";return;}
  err.textContent="解密中…";
  try{const html=await decrypt(pw);sessionStorage.setItem("wys_ar_pw",pw);document.open();document.write(html);document.close();}
  catch(e){err.textContent="密码错误，请重试";}
}
document.getElementById("go").addEventListener("click",enter);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")enter();});
(async()=>{const c=sessionStorage.getItem("wys_ar_pw");if(c){try{const h=await decrypt(c);document.open();document.write(h);document.close();}catch(e){sessionStorage.removeItem("wys_ar_pw");}}})();
document.getElementById("pw").focus();
</script>
