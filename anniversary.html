<script>
(function(){
  var data = JSON.parse(document.getElementById('payload').textContent);
  var b64 = function(s){return Uint8Array.from(atob(s), function(c){return c.charCodeAt(0)})};
  var pw = document.getElementById('pw'), go = document.getElementById('go'), err = document.getElementById('err');

  async function tryDecrypt(password){
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(data.salt), iterations:data.iter, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']
    );
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(data.iv)}, key, b64(data.ct));
    return new TextDecoder('utf-8').decode(pt);
  }

  function render(html){
    // 用 document.write 重建整个文档，确保 <script> 能正常执行
    document.open();
    document.write(html);
    document.close();
  }

  async function unlock(){
    err.textContent = '';
    go.disabled = true; go.textContent = '解密中…';
    try{
      var html = await tryDecrypt(pw.value);
      try{ sessionStorage.setItem('wys_pw', pw.value); }catch(e){}
      render(html);
    }catch(e){
      err.textContent = '密码不正确，请重试';
      go.disabled = false; go.textContent = '解锁';
      pw.select();
    }
  }

  go.addEventListener('click', unlock);
  pw.addEventListener('keydown', function(ev){ if(ev.key==='Enter') unlock(); });

  // 同会话内自动解锁
  try{
    var saved = sessionStorage.getItem('wys_pw');
    if(saved){ pw.value = saved; unlock(); }
  }catch(e){}
})();
</script>
