<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓦友社 · 周年庆加密访问</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0a0e13;color:#e8edf2;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
body{display:grid;place-items:center;overflow:hidden}
body::before{content:"";position:fixed;inset:-20%;background:radial-gradient(ellipse at 20% 18%,rgba(255,70,85,.24),transparent 36%),radial-gradient(ellipse at 80% 85%,rgba(255,215,0,.1),transparent 34%),linear-gradient(135deg,#0a0e13,#0f1923 56%,#07090d)}
body::after{content:"";position:fixed;inset:0;opacity:.18;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(ellipse at center,#000,transparent 78%)}
.card{position:relative;z-index:1;width:min(92vw,520px);padding:34px 32px 30px;background:rgba(15,25,35,.78);border:1px solid rgba(255,70,85,.46);box-shadow:0 28px 100px rgba(0,0,0,.56),0 0 80px rgba(255,70,85,.12),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(22px);clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px)}
.kicker{font-size:12px;letter-spacing:3px;color:#ff8a95;font-weight:900;margin-bottom:14px}
h1{font-size:clamp(32px,7vw,58px);line-height:.96;letter-spacing:-.06em;margin-bottom:14px;background:linear-gradient(135deg,#fff,#ffd7dc 44%,#ff4655);-webkit-background-clip:text;color:transparent}
p{color:rgba(232,237,242,.68);line-height:1.8;font-size:14px;margin-bottom:24px}
.form{display:flex;gap:10px;align-items:stretch}
input{flex:1;min-width:0;height:48px;background:rgba(2,7,12,.72);border:1px solid rgba(255,255,255,.12);color:#fff;padding:0 14px;outline:none;font-size:15px}
input:focus{border-color:#ff4655;box-shadow:0 0 0 3px rgba(255,70,85,.18)}
button{height:48px;padding:0 18px;border:0;background:#ff4655;color:#fff;font-weight:900;letter-spacing:1px;cursor:pointer;box-shadow:0 12px 30px rgba(255,70,85,.26)}
button:disabled{opacity:.55;cursor:not-allowed}
.err{min-height:20px;margin-top:14px;color:#ff8a95;font-size:13px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}
.meta span{font-size:11px;letter-spacing:1.5px;color:#ffdf72;border:1px solid rgba(255,215,0,.22);background:rgba(255,215,0,.07);padding:7px 9px;border-radius:999px;font-weight:800}
@media(max-width:560px){.card{padding:28px 22px}.form{flex-direction:column}button{width:100%}}
</style>
</head>

    <button id="btn" type="submit">解锁</button>

const ITERATIONS = 200000;
const enc = new TextEncoder();
const dec = new TextDecoder();
function bytesFromBase64(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function decrypt(password){
  const raw=bytesFromBase64(PAYLOAD);const salt=raw.slice(0,16);const iv=raw.slice(16,28);const data=raw.slice(28);
  const baseKey=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITERATIONS,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return dec.decode(plain);
}
async function unlock(password){
  const html=await decrypt(password);sessionStorage.setItem('wayoushe_anniversary_pwd',password);document.open();document.write(html);document.close();
}
document.getElementById('gate-form').addEventListener('submit',async(e)=>{
  e.preventDefault();const btn=document.getElementById('btn');const err=document.getElementById('err');const pwd=document.getElementById('pwd').value;
  btn.disabled=true;btn.textContent='验证中';err.textContent='';
  try{await unlock(pwd)}catch(ex){err.textContent='口令不正确或内容已更新，请重新输入。';btn.disabled=false;btn.textContent='解锁';}
});
const cached=sessionStorage.getItem('wayoushe_anniversary_pwd');if(cached)unlock(cached).catch(()=>sessionStorage.removeItem('wayoushe_anniversary_pwd'));
