html,body{height:100%;background:#08090d;color:#e2e6ee;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(255,70,85,.16),transparent 65%),#08090d}

button{width:100%;margin-top:14px;padding:13px;background:#ff4655;border:0;border-radius:8px;color:#fff;font-size:15px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:.2s}
button:hover{background:#ff5a68}
button:disabled{background:#444;cursor:not-allowed}
.err{margin-top:12px;color:#ff6b78;font-size:13px;min-height:18px}
.foot{margin-top:18px;font-size:11px;color:#5a6273;text-align:center}

<script>
(function(){
  var data = JSON.parse(document.getElementById('payload').textContent);
  var b64 = function(s){return Uint8Array.from(atob(s), function(c){return c.charCodeAt(0)})};
  var pw = document.getElementById('pw'), go = document.getElementById('go'), err = document.getElementById('err');
  async function tryDecrypt(password){
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(data.salt), iterations:data.iter, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']
    );
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(data.iv)}, key, b64(data.ct));
    return new TextDecoder('utf-8').decode(pt);
  }
  function render(html){ document.open(); document.write(html); document.close(); }
  async function unlock(){
    err.textContent=''; go.disabled=true; go.textContent='解密中…';
    try{
      var html = await tryDecrypt(pw.value);
      try{ sessionStorage.setItem('wys_pw', pw.value); }catch(e){}
      render(html);
    }catch(e){
      err.textContent='密码不正确，请重试';
      go.disabled=false; go.textContent='解锁'; pw.select();
    }
  }
  go.addEventListener('click', unlock);
  pw.addEventListener('keydown', function(ev){ if(ev.key==='Enter') unlock(); });
  try{ var s = sessionStorage.getItem('wys_pw'); if(s){ pw.value = s; unlock(); } }catch(e){}
})();
</script>
