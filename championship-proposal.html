<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALORANT · 加密文档</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#05080c;color:#ece8e1;overflow:hidden}
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 500px at 78% -10%,rgba(255,70,85,.18),transparent 60%),
      radial-gradient(700px 500px at -5% 110%,rgba(33,212,180,.06),transparent 55%),
      linear-gradient(160deg,#0a0e13,#0f1923 55%,#0b1521);z-index:9999}
  #gate::before{content:"";position:absolute;inset:0;opacity:.45;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:42px 42px;mask-image:linear-gradient(180deg,#000,transparent 88%)}
  .box{position:relative;width:380px;max-width:88vw;padding:42px 36px 34px;border-radius:8px;
    background:linear-gradient(180deg,rgba(20,31,46,.92),rgba(15,25,35,.78));
    border:1px solid rgba(255,70,85,.28);box-shadow:0 30px 90px rgba(0,0,0,.6),0 0 50px rgba(255,70,85,.08) inset}
  .box::after{content:"";position:absolute;top:0;right:0;width:5px;height:100%;background:linear-gradient(180deg,#ff4655,transparent)}
  .kick{display:flex;align-items:center;gap:9px;font-size:10px;letter-spacing:.3em;color:#ff4655;text-transform:uppercase;font-weight:700}
  .kick .d{width:7px;height:7px;background:#ff4655;transform:rotate(45deg);box-shadow:0 0 12px #ff4655}
  h1{font-size:23px;font-weight:800;margin:12px 0 4px;letter-spacing:.02em}
  .sub{font-size:12px;color:#8b97a7;margin-bottom:22px;line-height:1.5}
  label{display:block;font-size:10px;letter-spacing:.18em;color:#8b97a7;text-transform:uppercase;margin-bottom:8px}
  .row{display:flex;gap:9px}
  input{flex:1;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:5px;
    padding:12px 14px;color:#fff;font-size:14px;letter-spacing:.04em;outline:none;transition:border-color .2s}
  input:focus{border-color:#ff4655;box-shadow:0 0 0 3px rgba(255,70,85,.12)}
  button{background:linear-gradient(135deg,#ff4655,#bd3944);border:none;border-radius:5px;color:#fff;
    font-size:13px;font-weight:700;letter-spacing:.08em;padding:0 20px;cursor:pointer;transition:transform .15s,filter .2s}
  button:hover{filter:brightness(1.12)}button:active{transform:scale(.96)}
  .err{margin-top:14px;font-size:12px;color:#ff6b78;min-height:16px;letter-spacing:.02em}
  .ft{margin-top:20px;font-size:9.5px;letter-spacing:.12em;color:#52606f;text-transform:uppercase}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div class="kick"><span class="d"></span>Encrypted · Internal</div>
    <h1>受保护文档</h1>
    <div class="sub">本页为加密内部提案，请输入访问密码后查看。</div>
    <label>Access Password</label>
    <div class="row">
      <input id="pw" type="password" placeholder="请输入密码" autocomplete="off" autofocus>
      <button id="go">解锁</button>
    </div>
    <div class="err" id="err"></div>
    <div class="ft">AES-256-GCM · PBKDF2-SHA256</div>
  </div>
</div>

function b64ToBytes(b){const s=atob(b);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function decrypt(pw){
  const p = JSON.parse(new TextDecoder().decode(b64ToBytes(PAYLOAD)));
  const salt=b64ToBytes(p.salt), iv=b64ToBytes(p.iv), ct=b64ToBytes(p.ct);
  const baseKey=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:p.iter,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const pw=document.getElementById("pw").value;
  const err=document.getElementById("err");
  if(!pw){err.textContent="请输入密码";return;}
  err.textContent="解密中…";
  try{
    const html=await decrypt(pw);
    sessionStorage.setItem("wys_pw",pw);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent="密码错误，无法解密。";}
}
document.getElementById("go").addEventListener("click",unlock);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
const cached=sessionStorage.getItem("wys_pw");
if(cached){document.getElementById("pw").value=cached;unlock();}
</script>
