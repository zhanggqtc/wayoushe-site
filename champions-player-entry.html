<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冠军阵线 · 加密访问</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#060b12;color:#f3f6f2;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
body{display:grid;place-items:center;overflow:hidden}
body::before{content:"";position:fixed;inset:-20%;background:radial-gradient(ellipse at 22% 18%,rgba(125,232,242,.22),transparent 34%),radial-gradient(ellipse at 78% 82%,rgba(216,181,104,.14),transparent 32%),radial-gradient(ellipse at 80% 18%,rgba(255,70,85,.16),transparent 34%),linear-gradient(135deg,#06121b,#0a2635 56%,#03070d)}
body::after{content:"";position:fixed;inset:0;opacity:.18;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(ellipse at center,#000,transparent 78%)}
.card{position:relative;z-index:1;width:min(92vw,560px);padding:36px 34px 32px;background:rgba(6,18,27,.78);border:1px solid rgba(216,181,104,.46);box-shadow:0 28px 100px rgba(0,0,0,.58),0 0 90px rgba(125,232,242,.10),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(22px);clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px)}
.kicker{font-size:12px;letter-spacing:3px;color:#d8b568;font-weight:950;margin-bottom:14px;text-transform:uppercase}
h1{font-size:clamp(36px,7vw,66px);line-height:.92;letter-spacing:-.07em;margin-bottom:14px;background:linear-gradient(135deg,#fff,#f5e1a6 45%,#7de8f2);-webkit-background-clip:text;color:transparent}
p{color:rgba(243,246,242,.70);line-height:1.8;font-size:14px;margin-bottom:24px}
.form{display:flex;gap:10px;align-items:stretch}
input{flex:1;min-width:0;height:50px;background:rgba(2,7,12,.72);border:1px solid rgba(255,255,255,.12);color:#fff;padding:0 14px;outline:none;font-size:15px}
input:focus{border-color:#d8b568;box-shadow:0 0 0 3px rgba(216,181,104,.16)}
button{height:50px;padding:0 20px;border:0;background:linear-gradient(90deg,#d8b568,#ff4655);color:#fff;font-weight:950;letter-spacing:1px;cursor:pointer;box-shadow:0 12px 30px rgba(216,181,104,.22)}
button:disabled{opacity:.55;cursor:not-allowed}
.err{min-height:20px;margin-top:14px;color:#ff8a95;font-size:13px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}
.meta span{font-size:11px;letter-spacing:1.5px;color:#f4dc9a;border:1px solid rgba(216,181,104,.24);background:rgba(216,181,104,.08);padding:7px 9px;border-radius:999px;font-weight:850}
@media(max-width:560px){.card{padding:28px 22px}.form{flex-direction:column}button{width:100%}}
</style>
</head>
<body>

const ITERATIONS = 200000;
const enc = new TextEncoder();
const dec = new TextDecoder();
function bytesFromBase64(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function decrypt(password){
  const raw=bytesFromBase64(PAYLOAD);const salt=raw.slice(0,16);const iv=raw.slice(16,28);const data=raw.slice(28);
  const baseKey=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITERATIONS,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return dec.decode(plain);
}
async function unlock(password){
  const html=await decrypt(password);sessionStorage.setItem('wayoushe_champions_pwd',password);document.open();document.write(html);document.close();
}
document.getElementById('gate-form').addEventListener('submit',async(e)=>{

  try{await unlock(pwd)}catch(ex){err.textContent='口令不正确或内容已更新，请重新输入。';btn.disabled=false;btn.textContent='解锁';}
});
